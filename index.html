<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRSPY AR Glasses</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/i18next@21.6.16/i18next.min.js"></script>
  <script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
</head>
<body>
  <header>
    <h1 id="title">CRSPY AR Glasses</h1>
    <div class="language-switch">
      <button id="lang-en">EN</button>
      <button id="lang-pl">PL</button>
    </div>
  </header>

  <main>
    <section class="ar-demo">
      <canvas id="arCanvas"></canvas>
      <div class="controls">
        <button id="startDemo" class="btn">Start Demo</button>
        <button id="stopDemo" class="btn">Stop Demo</button>
        <button id="toggleMode" class="btn">Dark Mode</button>
      </div>
    </section>
    
    <section class="info">
      <h2 id="subtitle">Experience Augmented Reality</h2>
      <p id="description">Try out our AR glasses simulation with fully interactive features and multiple languages.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 CRSPY AR Glasses</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
